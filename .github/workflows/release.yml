name: Release Obsidian plugin

# manifest.json 의 version 과 동일한 태그를 push 하면(예: 0.1.0, 앞에 v 없이)
# 빌드 후 main.js / manifest.json / styles.css 를 자산으로 단 draft 릴리스를 만든다.
# 내용 확인 후 GitHub에서 draft를 publish 하면 BRAT가 그 릴리스를 받아 설치한다.

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::tag '${{ github.ref_name }}' != manifest.json version '$MANIFEST_VERSION'"
            exit 1
          fi

      - name: Create draft release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title="${{ github.ref_name }}" \
            --notes-from-tag \
            --draft \
            main.js manifest.json styles.css
